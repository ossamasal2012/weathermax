name: Build Android APK with Icon & Internet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/push-notifications @capacitor/network
          npm install @capacitor/assets --save-dev
          mkdir -p www
          cp index.html www/index.html

      - name: Download Icon
        run: |
          mkdir -p assets
          curl -L "https://i.ibb.co/5hX004bW/Chat-GPT-Image-29-2026-05-26-13.png" -o assets/icon.png
          cp assets/icon.png assets/splash.png

      - name: Initialize Capacitor
        run: |
          npx cap init "OSSAMA Weather" "com.ossama.weather" --web-dir www
          npx cap add android

      # خطوة هامة: تفعيل تراخيص الإنترنت في ملف Manifest
      - name: Enable Internet Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST_PATH
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST_PATH
          # تفعيل دعم الروابط غير المشفرة http (اختياري ولكن مفيد)
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST_PATH

      - name: Generate Assets
        run: npx capacitor-assets generate --android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Android Project
        run: |
          npx cap sync
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OSSAMA-Weather-Internet-Fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
