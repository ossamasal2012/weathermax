name: Build Android APK Final Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/push-notifications @capacitor/network
          npm install @capacitor/assets --save-dev
          mkdir -p www
          cp index.html www/index.html

      - name: Initialize Capacitor
        run: |
          npx cap init "OSSAMA Weather" "com.ossama.weather" --web-dir www
          npx cap add android

      - name: Handle Assets and Config
        run: |
          mkdir -p assets
          curl -L "https://i.ibb.co/5hX004bW/Chat-GPT-Image-29-2026-05-26-13.png" -o assets/icon.png
          cp assets/icon.png assets/splash.png
          if [ -f "google-services.json" ]; then
            mv google-services.json android/app/google-services.json
          fi

      # --- إصلاح ملف MainActivity.java جذرياً ---
      - name: Reconstruct MainActivity.java
        run: |
          PACKAGE_DIR="android/app/src/main/java/com/ossama/weather"
          mkdir -p $PACKAGE_DIR
          echo "package com.ossama.weather;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }" > $PACKAGE_DIR/MainActivity.java

      # --- إصلاح أذونات الإنترنت وسياسة الشبكة ---
      - name: Configure Android Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          # إزالة أي تكرار لأذونات الإنترنت ثم إضافتها بشكل نظيف
          sed -i '/android.permission.INTERNET/d' $MANIFEST_PATH
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST_PATH
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST_PATH
          
          # إنشاء ملف سياسة الشبكة
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true" /></network-security-config>' > android/app/src/main/res/xml/network_security_config.xml
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' $MANIFEST_PATH

      - name: Generate Assets
        run: npx capacitor-assets generate --android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Android Project
        run: |
          npx cap sync
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OSSAMA-Weather-Fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk
