name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # نسخة مستقرة وحديثة

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/push-notifications @capacitor/network
          mkdir -p www
          # نسخ ملفك وتغيير اسمه ليكون الصفحة الرئيسية للتطبيق
          cp "الطقس ai.html" www/index.html

      - name: Initialize Capacitor
        run: |
          # استخدام اسم الحزمة com.ossama.weather كما اتفقنا
          npx cap init "OSSAMA Weather" "com.ossama.weather" --web-dir www
          npx cap add android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android Project
        run: |
          npx cap sync
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # تم التحديث إلى v4 لحل المشكلة
        with:
          name: OSSAMA-Weather-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
